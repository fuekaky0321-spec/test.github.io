<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Cast Schedule</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f7f7;
    }

    #schedule-area {
      margin-top: 30px;
    }

    .location-block {
      margin-bottom: 30px;
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .cast {
      margin-top: 15px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Today's Cast</h1>

<div id="schedule-area"></div>

<script>

const CAST_DICT = {
  "MAAYA": "https://www.canva.com/design/DAHKEvpK2hk/pFVKh--tI0O1TqFShAN6tA/view",
  "NAKO": "https://www.canva.com/design/DAHKEj4Qwf0/BpbRYJCz2i66K8OdyhcLcA/view",
  "HONO": "https://www.canva.com/design/DAHKEhBRJws/HTyusJhLG7ZV0EdGPkORGg/view",
  "YU": "https://www.canva.com/design/DAHKEqQ7D1U/q9OnBGdS0_5P-hdb5xSJKw/view"
};

// ★ 今日の日付（スプシと完全一致させる）
const today = new Date().toISOString().split("T")[0];

// ★ Google Sheets（gviz）
const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/1wJrWj4cK01nAZmx9hFQJsml3Za77jlADrGAmyOfqfBM/gviz/tq?tqx=out:json";

fetch(SHEET_URL)
  .then(res => res.text())
  .then(text => {

    // gvizの余計なラッパー削除
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    // データ整形（超シンプル）
    const data = rows.map(r => ({
      date: r.c[0]?.v,
      location: r.c[1]?.v,
      casts: [r.c[2]?.v, r.c[3]?.v, r.c[4]?.v].filter(Boolean)
    }));

    // 今日だけ抽出
    const todayData = data.filter(d => d.date === today);

    const area = document.getElementById("schedule-area");

    if (todayData.length === 0) {
      area.innerHTML = "<p>No cast today</p>";
      return;
    }

    todayData.forEach(loc => {

      const block = document.createElement("div");
      block.className = "location-block";

      let html = `<h2>${loc.location}</h2>`;

      loc.casts.forEach(name => {

        const url = CAST_DICT[name];

        if (!url) {
          html += `<p>${name}（未登録）</p>`;
          return;
        }

        html += `
          <div class="cast">
            <h3>${name}</h3>
            <iframe src="${url}"></iframe>
          </div>
        `;
      });

      block.innerHTML = html;
      area.appendChild(block);
    });

  })
  .catch(err => {
    console.error(err);
    document.getElementById("schedule-area").innerHTML =
      "<p>データ取得に失敗しました</p>";
  });

</script>

</body>
</html>
